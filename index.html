<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>冰箱管理</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #eef4f8;
  --surface: #f8fbfd;
  --surface2: #e4eef5;
  --border: rgba(80,140,180,0.18);
  --text: #1a2e3a;
  --text-muted: rgba(40,90,120,0.5);
  --accent: #3a7fa8;
  --accent-light: rgba(58,127,168,0.12);
  --accent-dim: rgba(58,127,168,0.07);
  --warn: #e05a2b;
  --warn-light: rgba(224,90,43,0.1);
  --ok: #2e9e6e;
  --ok-light: rgba(46,158,110,0.1);
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, 'Helvetica Neue', sans-serif;
  min-height: 100vh;
  padding-top: max(44px, env(safe-area-inset-top));
  padding-bottom: max(80px, env(safe-area-inset-bottom));
}

/* Header */
.header {
  padding: 14px 16px 0;
  display: flex; align-items: center; justify-content: space-between;
}
.header-left .title { font-size: 20px; font-weight: 300; letter-spacing: -0.02em; }
.header-left .subtitle { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.add-fab {
  width: 40px; height: 40px;
  border-radius: 12px;
  background: var(--accent);
  border: none;
  color: #fff;
  font-size: 22px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 8px rgba(58,127,168,0.3);
  -webkit-appearance: none;
}

/* Filter tabs */
.filter-row {
  display: flex;
  gap: 6px;
  padding: 12px 16px 0;
  overflow-x: auto;
  scrollbar-width: none;
}
.filter-row::-webkit-scrollbar { display: none; }
.filter-btn {
  flex-shrink: 0;
  padding: 5px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: none;
  color: var(--text-muted);
  font-size: 12px;
  cursor: pointer;
  font-family: inherit;
  -webkit-appearance: none;
  transition: all 0.15s;
}
.filter-btn.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

/* Stats bar */
.stats-bar {
  display: flex;
  gap: 8px;
  padding: 12px 16px 0;
}
.stat-box {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px 12px;
  text-align: center;
}
.stat-num { font-size: 20px; font-weight: 500; color: var(--accent); }
.stat-num.warn { color: var(--warn); }
.stat-label { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

/* Food list */
.list { padding: 12px 16px; }

.section-header {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin: 12px 0 6px;
  padding-left: 2px;
}

.food-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 12px 14px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  transition: transform 0.1s;
}
.food-card:active { transform: scale(0.98); }
.food-card.expiring {
  border-color: rgba(224,90,43,0.3);
  border-left: 3px solid var(--warn);
  background: rgba(255,250,247,1);
}
.food-card.expired {
  border-color: rgba(180,50,50,0.3);
  border-left: 3px solid #c0392b;
  background: rgba(255,247,247,1);
  opacity: 0.7;
}

.cat-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.cat-veg { background: #4caf7d; }
.cat-meat { background: #e05a5a; }
.cat-seafood { background: #5a9ee0; }
.cat-condiment { background: #e0b85a; }
.cat-other { background: #9e8ae0; }

.food-info { flex: 1; min-width: 0; }
.food-name { font-size: 15px; font-weight: 500; }
.food-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

.days-badge {
  font-size: 11px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 8px;
  white-space: nowrap;
  flex-shrink: 0;
}
.days-ok { background: var(--ok-light); color: var(--ok); }
.days-warn { background: var(--warn-light); color: var(--warn); }
.days-expired { background: rgba(192,57,43,0.1); color: #c0392b; }

.food-del {
  background: none;
  border: none;
  color: rgba(80,140,180,0.3);
  font-size: 18px;
  cursor: pointer;
  padding: 0 2px;
  flex-shrink: 0;
  -webkit-appearance: none;
}

.empty-state {
  text-align: center;
  padding: 48px 20px;
  color: var(--text-muted);
}
.empty-icon { font-size: 48px; margin-bottom: 12px; }

/* Modal */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 100;
  align-items: flex-end;
  justify-content: center;
  overflow: hidden;
}
.modal-overlay.open { display: flex; }
.modal-sheet {
  background: var(--surface);
  border-radius: 20px 20px 0 0;
  padding: 20px 20px max(28px, env(safe-area-inset-bottom));
  width: 100vw;
  max-width: 480px;
  box-sizing: border-box;
}
.modal-sheet h3 { font-size: 16px; font-weight: 500; margin-bottom: 14px; }
.modal-input, .modal-select {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 12px;
  font-size: 14px;
  color: var(--text);
  font-family: inherit;
  outline: none;
  margin-bottom: 8px;
  box-sizing: border-box;
}
.modal-select { -webkit-appearance: auto; appearance: auto; background-image: none; }
.modal-input::placeholder { color: var(--text-muted); }
.modal-row { display: flex; gap: 8px; }
.modal-row .modal-input { margin-bottom: 0; }
.modal-actions { display: flex; gap: 8px; margin-top: 12px; }
.modal-btn {
  flex: 1; padding: 11px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: none;
  color: var(--text);
  font-size: 14px;
  cursor: pointer;
  font-family: inherit;
  -webkit-appearance: none;
}
.modal-btn.confirm { background: var(--accent); color: #fff; border-color: var(--accent); }

/* Suggestions dropdown */
.suggest-list {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 8px;
  overflow: hidden;
  display: none;
}
.suggest-list.open { display: block; }
.suggest-item {
  padding: 10px 12px;
  font-size: 14px;
  cursor: pointer;
  border-bottom: 0.5px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.suggest-item:last-child { border-bottom: none; }
.suggest-item:active { background: var(--accent-light); }
.suggest-days { font-size: 11px; color: var(--text-muted); margin-left: auto; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="title">🧊 冰箱管理</div>
    <div class="subtitle" id="header-subtitle">載入中...</div>
  </div>
  <button class="add-fab" id="add-btn">+</button>
</div>

<div class="filter-row" id="filter-row"></div>

<div class="stats-bar" id="stats-bar">
  <div class="stat-box">
    <div class="stat-num" id="stat-total">0</div>
    <div class="stat-label">總食材</div>
  </div>
  <div class="stat-box">
    <div class="stat-num warn" id="stat-expiring">0</div>
    <div class="stat-label">即將過期</div>
  </div>
  <div class="stat-box">
    <div class="stat-num" id="stat-safe">0</div>
    <div class="stat-label">狀況良好</div>
  </div>
</div>

<div class="list" id="food-list"></div>
<div class="list" id="settings-page" style="display:none;">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
    <div style="font-size:16px;font-weight:500;">食材資料庫</div>
    <button id="db-add-btn" style="padding:6px 14px;border-radius:10px;background:var(--accent);color:#fff;border:none;font-size:13px;cursor:pointer;font-family:inherit;">+ 新增</button>
  </div>
  <div id="db-search-wrap" style="position:relative;margin-bottom:12px;">
    <input id="db-search" class="modal-input" placeholder="搜尋食材..." style="padding-left:32px;margin-bottom:0;" />
    <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:14px;pointer-events:none;">🔍</span>
  </div>
  <div id="db-list"></div>
</div>

<!-- ADD / EDIT MODAL -->
<div class="modal-overlay" id="add-modal">
  <div class="modal-sheet">
    <h3 id="modal-title">新增食材</h3>
    <input class="modal-input" id="food-name-input" placeholder="食材名稱..." maxlength="20" autocomplete="off" />
    <div class="suggest-list" id="suggest-list"></div>
    <div class="modal-row">
      <select class="modal-select" id="food-cat" style="flex:1;">
        <option value="veg">🥬 蔬菜</option>
        <option value="meat">🥩 肉類</option>
        <option value="seafood">🐟 海鮮</option>
        <option value="condiment">🧂 調味料</option>
        <option value="other">📦 其他</option>
      </select>
    </div>
    <div style="margin-top:8px;margin-bottom:8px;">
      <label style="font-size:12px;color:var(--text-muted);display:block;margin-bottom:4px;">購買日期</label>
      <input class="modal-input" type="date" id="food-buy-date" style="margin-bottom:0;" />
    </div>
    <div>
      <label style="font-size:12px;color:var(--text-muted);display:block;margin-bottom:4px;">建議保存天數</label>
      <input class="modal-input" type="number" id="food-days" placeholder="天" min="1" max="365" style="margin-bottom:0;" />
    </div>
    <div style="font-size:11px;color:var(--text-muted);margin-top:4px;margin-bottom:4px;" id="expiry-preview"></div>
    <div class="modal-actions">
      <button class="modal-btn" id="modal-cancel">取消</button>
      <button class="modal-btn confirm" id="modal-confirm">加入冰箱</button>
    </div>
  </div>
</div>

<!-- BOTTOM TAB BAR -->
<div style="position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:0.5px solid var(--border);padding:8px 0 max(12px, env(safe-area-inset-bottom));display:flex;z-index:50;">
  <button class="tab-btn active" id="tab-fridge" onclick="switchTab('fridge')" style="flex:1;background:none;border:none;cursor:pointer;font-family:inherit;padding:4px 0;">
    <div style="font-size:20px;">🧊</div>
    <div style="font-size:10px;color:var(--accent);font-weight:500;">冰箱</div>
  </button>
  <button class="tab-btn" id="tab-settings" onclick="switchTab('settings')" style="flex:1;background:none;border:none;cursor:pointer;font-family:inherit;padding:4px 0;">
    <div style="font-size:20px;">📋</div>
    <div style="font-size:10px;color:var(--text-muted);">食材設定</div>
  </button>
</div>

<!-- DB EDIT MODAL -->
<div class="modal-overlay" id="db-modal">
  <div class="modal-sheet">
    <h3 id="db-modal-title">新增食材</h3>
    <input class="modal-input" id="db-food-name" placeholder="食材名稱..." maxlength="20" />
    <input class="modal-input" type="number" id="db-food-days" placeholder="建議保存天數" min="1" max="365" />
    <select class="modal-select" id="db-food-cat" style="width:100%;margin-bottom:8px;">
      <option value="veg">🥬 蔬菜</option>
      <option value="meat">🥩 肉類</option>
      <option value="seafood">🐟 海鮮</option>
      <option value="condiment">🧂 調味料</option>
      <option value="other">📦 其他</option>
    </select>
    <div class="modal-actions">
      <button class="modal-btn" id="db-cancel">取消</button>
      <button class="modal-btn confirm" id="db-save">儲存</button>
    </div>
    <button id="db-delete" style="display:none;width:100%;margin-top:8px;padding:11px;border-radius:10px;border:1px solid rgba(192,57,43,0.3);background:none;color:#c0392b;font-size:14px;cursor:pointer;font-family:inherit;">刪除這個食材設定</button>
  </div>
</div>

<!-- CONFIRM DELETE -->
<div class="modal-overlay" id="confirm-modal">
  <div class="modal-sheet">
    <h3>確認刪除</h3>
    <p style="font-size:14px;color:var(--text-muted);margin-bottom:16px;" id="confirm-msg"></p>
    <div class="modal-actions">
      <button class="modal-btn" id="confirm-cancel">取消</button>
      <button class="modal-btn" id="confirm-ok" style="background:#c0392b;color:#fff;border-color:#c0392b;">刪除</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'pipi_fridge_v1';

const CATS = [
  { id: 'all', name: '全部' },
  { id: 'veg', name: '🥬 蔬菜' },
  { id: 'meat', name: '🥩 肉類' },
  { id: 'seafood', name: '🐟 海鮮' },
  { id: 'condiment', name: '🧂 調味料' },
  { id: 'other', name: '📦 其他' },
];

const CAT_DOT = { veg:'cat-veg', meat:'cat-meat', seafood:'cat-seafood', condiment:'cat-condiment', other:'cat-other' };

// Built-in shelf life database {name: {days, cat}}
const SHELF_LIFE_DB = {
  '高麗菜':{days:7,cat:'veg'},'菠菜':{days:3,cat:'veg'},'空心菜':{days:3,cat:'veg'},'青江菜':{days:4,cat:'veg'},
  '花椰菜':{days:5,cat:'veg'},'青花菜':{days:5,cat:'veg'},'番茄':{days:5,cat:'veg'},'小黃瓜':{days:5,cat:'veg'},
  '茄子':{days:5,cat:'veg'},'青椒':{days:7,cat:'veg'},'紅蘿蔔':{days:14,cat:'veg'},'白蘿蔔':{days:10,cat:'veg'},
  '馬鈴薯':{days:14,cat:'veg'},'地瓜':{days:14,cat:'veg'},'洋蔥':{days:30,cat:'veg'},'蔥':{days:5,cat:'veg'},
  '薑':{days:14,cat:'veg'},'蒜':{days:30,cat:'veg'},'韭菜':{days:3,cat:'veg'},'豆芽':{days:2,cat:'veg'},
  '玉米':{days:3,cat:'veg'},'南瓜':{days:7,cat:'veg'},'苦瓜':{days:5,cat:'veg'},'絲瓜':{days:4,cat:'veg'},
  '冬瓜':{days:7,cat:'veg'},'芹菜':{days:5,cat:'veg'},'香菜':{days:4,cat:'veg'},'九層塔':{days:4,cat:'veg'},'豆腐':{days:3,cat:'veg'},
  '雞肉':{days:2,cat:'meat'},'雞胸':{days:2,cat:'meat'},'雞腿':{days:2,cat:'meat'},'豬肉':{days:2,cat:'meat'},
  '豬里肌':{days:2,cat:'meat'},'豬五花':{days:2,cat:'meat'},'牛肉':{days:3,cat:'meat'},'羊肉':{days:3,cat:'meat'},
  '絞肉':{days:1,cat:'meat'},'香腸':{days:7,cat:'meat'},'臘腸':{days:14,cat:'meat'},'火腿':{days:7,cat:'meat'},
  '培根':{days:7,cat:'meat'},'雞蛋':{days:21,cat:'meat'},'滷蛋':{days:3,cat:'meat'},
  '蝦仁':{days:2,cat:'seafood'},'鮮蝦':{days:1,cat:'seafood'},'魚片':{days:2,cat:'seafood'},'鮭魚':{days:2,cat:'seafood'},
  '透抽':{days:2,cat:'seafood'},'花枝':{days:2,cat:'seafood'},'蛤蠣':{days:2,cat:'seafood'},'牡蠣':{days:1,cat:'seafood'},
  '螃蟹':{days:1,cat:'seafood'},'魚丸':{days:5,cat:'seafood'},'蝦丸':{days:5,cat:'seafood'},
  '醬油':{days:180,cat:'condiment'},'味噌':{days:90,cat:'condiment'},'豆瓣醬':{days:90,cat:'condiment'},
  '沙茶醬':{days:60,cat:'condiment'},'番茄醬':{days:30,cat:'condiment'},'美乃滋':{days:30,cat:'condiment'},
  '芥末':{days:30,cat:'condiment'},'醋':{days:180,cat:'condiment'},'米酒':{days:180,cat:'condiment'},'料理酒':{days:180,cat:'condiment'},
  '牛奶':{days:7,cat:'other'},'豆漿':{days:5,cat:'other'},'優格':{days:14,cat:'other'},'起司':{days:14,cat:'other'},
  '奶油':{days:30,cat:'other'},'剩飯':{days:2,cat:'other'},'剩菜':{days:2,cat:'other'},
};
// Flat days lookup for backward compat
const SHELF_LIFE = Object.fromEntries(Object.entries(SHELF_LIFE_DB).map(([k,v])=>[k,v.days]));

function loadData() {
  try { const d = localStorage.getItem(STORAGE_KEY); if (d) return JSON.parse(d); } catch(e) {}
  return { foods: [] };
}
function saveData() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(appData)); } catch(e) {}
}

let appData = loadData();
if (!appData.foods) appData.foods = [];
let currentCat = 'all';
let editingIdx = -1;
let confirmCb = null;

function today() { return new Date().toISOString().split('T')[0]; }

function daysLeft(item) {
  const buy = new Date(item.buyDate);
  const expire = new Date(buy);
  expire.setDate(buy.getDate() + item.days);
  const now = new Date(); now.setHours(0,0,0,0);
  return Math.ceil((expire - now) / (1000*60*60*24));
}

function buildFilterRow() {
  const row = document.getElementById('filter-row');
  row.innerHTML = '';
  CATS.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (c.id === currentCat ? ' active' : '');
    btn.textContent = c.name;
    btn.onclick = () => { currentCat = c.id; buildFilterRow(); renderList(); };
    row.appendChild(btn);
  });
}

function renderList() {
  const list = document.getElementById('food-list');
  list.innerHTML = '';

  let foods = appData.foods.map((f, i) => ({ ...f, _idx: i, _days: daysLeft(f) }));
  if (currentCat !== 'all') foods = foods.filter(f => f.cat === currentCat);

  // Sort: expired first (most negative), then expiring, then by days asc
  foods.sort((a, b) => a._days - b._days);

  const expired = foods.filter(f => f._days <= 0);
  const expiring = foods.filter(f => f._days > 0 && f._days <= 3);
  const ok = foods.filter(f => f._days > 3);

  document.getElementById('stat-total').textContent = appData.foods.length;
  document.getElementById('stat-expiring').textContent = appData.foods.filter(f => { const d = daysLeft(f); return d > 0 && d <= 3; }).length;
  document.getElementById('stat-safe').textContent = appData.foods.filter(f => daysLeft(f) > 3).length;

  const total = foods.length;
  document.getElementById('header-subtitle').textContent = total === 0 ? '冰箱是空的' : `共 ${total} 樣食材`;

  if (foods.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">🧊</div><div>冰箱是空的<br>按右上角 + 新增食材</div></div>`;
    return;
  }

  function renderSection(title, items, cls) {
    if (items.length === 0) return;
    const header = document.createElement('div');
    header.className = 'section-header';
    header.textContent = title;
    list.appendChild(header);
    items.forEach(f => renderCard(f, cls));
  }

  renderSection('⚠️ 已過期', expired, 'expired');
  renderSection('🔴 3天內到期', expiring, 'expiring');
  renderSection('✅ 狀況良好', ok, '');
}

function renderCard(f, extraCls) {
  const list = document.getElementById('food-list');
  const card = document.createElement('div');
  card.className = 'food-card' + (extraCls ? ' ' + extraCls : '');

  const dot = document.createElement('div');
  dot.className = 'cat-dot ' + (CAT_DOT[f.cat] || 'cat-other');

  const info = document.createElement('div');
  info.className = 'food-info';
  const buyFmt = f.buyDate ? f.buyDate.replace(/-/g, '/') : '';
  info.innerHTML = `<div class="food-name">${f.name}</div><div class="food-meta">購入 ${buyFmt}・保存 ${f.days} 天</div>`;

  const badge = document.createElement('div');
  const d = f._days;
  if (d <= 0) {
    badge.className = 'days-badge days-expired';
    badge.textContent = '已過期';
  } else if (d <= 3) {
    badge.className = 'days-badge days-warn';
    badge.textContent = `剩 ${d} 天`;
  } else {
    badge.className = 'days-badge days-ok';
    badge.textContent = `剩 ${d} 天`;
  }

  const del = document.createElement('button');
  del.className = 'food-del';
  del.textContent = '×';
  del.onclick = (e) => {
    e.stopPropagation();
    showConfirm(`確定要刪除「${f.name}」嗎？`, () => {
      appData.foods.splice(f._idx, 1);
      saveData();
      renderList();
    });
  };

  card.appendChild(dot);
  card.appendChild(info);
  card.appendChild(badge);
  card.appendChild(del);

  card.onclick = (e) => {
    if (e.target === del) return;
    openEditModal(f._idx);
  };

  list.appendChild(card);
}

// Add/Edit modal
function openAddModal() {
  editingIdx = -1;
  document.getElementById('modal-title').textContent = '新增食材';
  document.getElementById('modal-confirm').textContent = '加入冰箱';
  document.getElementById('food-name-input').value = '';
  document.getElementById('food-cat').value = 'veg';
  document.getElementById('food-buy-date').value = today();
  document.getElementById('food-days').value = '';
  document.getElementById('expiry-preview').textContent = '';
  document.getElementById('suggest-list').classList.remove('open');
  document.getElementById('add-modal').classList.add('open');
  setTimeout(() => document.getElementById('food-name-input').focus(), 100);
}

function openEditModal(idx) {
  editingIdx = idx;
  const f = appData.foods[idx];
  document.getElementById('modal-title').textContent = '編輯食材';
  document.getElementById('modal-confirm').textContent = '儲存';
  document.getElementById('food-name-input').value = f.name;
  document.getElementById('food-cat').value = f.cat;
  document.getElementById('food-buy-date').value = f.buyDate;
  document.getElementById('food-days').value = f.days;
  document.getElementById('suggest-list').classList.remove('open');
  updateExpiryPreview();
  document.getElementById('add-modal').classList.add('open');
}

function updateExpiryPreview() {
  const buyDate = document.getElementById('food-buy-date').value;
  const days = parseInt(document.getElementById('food-days').value);
  if (!buyDate || !days) { document.getElementById('expiry-preview').textContent = ''; return; }
  const expire = new Date(buyDate);
  expire.setDate(expire.getDate() + days);
  const expireStr = expire.toISOString().split('T')[0].replace(/-/g,'/');
  document.getElementById('expiry-preview').textContent = `預計 ${expireStr} 到期`;
}

document.getElementById('food-buy-date').oninput = updateExpiryPreview;
document.getElementById('food-days').oninput = updateExpiryPreview;

// Suggestions
document.getElementById('food-name-input').oninput = (e) => {
  const q = e.target.value.trim();
  const sl = document.getElementById('suggest-list');
  if (!q) { sl.classList.remove('open'); return; }
  const mergedFull = getMergedDbFull();
  const matches = Object.entries(mergedFull).filter(([name]) => name.includes(q)).map(([name,v])=>[name,v.days]).slice(0, 5);
  if (matches.length === 0) { sl.classList.remove('open'); return; }
  sl.innerHTML = '';
  matches.forEach(([name, days]) => {
    const item = document.createElement('div');
    item.className = 'suggest-item';
    item.innerHTML = `<span>${name}</span><span class="suggest-days">建議 ${days} 天</span>`;
    item.onclick = () => {
      document.getElementById('food-name-input').value = name;
      document.getElementById('food-days').value = days;
      sl.classList.remove('open');
      updateExpiryPreview();
      // Auto-select category
      if (['高麗菜','菠菜','空心菜','青江菜','花椰菜','青花菜','番茄','小黃瓜','茄子','青椒','紅蘿蔔','白蘿蔔','馬鈴薯','地瓜','洋蔥','蔥','薑','蒜','韭菜','豆芽','玉米','南瓜','苦瓜','絲瓜','冬瓜','芹菜','香菜','九層塔','豆腐'].includes(name)) document.getElementById('food-cat').value = 'veg';
      else if (['雞肉','雞胸','雞腿','豬肉','豬里肌','豬五花','牛肉','羊肉','絞肉','香腸','臘腸','火腿','培根','雞蛋','滷蛋'].includes(name)) document.getElementById('food-cat').value = 'meat';
      else if (['蝦仁','鮮蝦','魚片','鮭魚','透抽','花枝','蛤蠣','牡蠣','螃蟹','魚丸','蝦丸'].includes(name)) document.getElementById('food-cat').value = 'seafood';
      else if (['醬油','味噌','豆瓣醬','沙茶醬','番茄醬','美乃滋','芥末','醋','米酒','料理酒'].includes(name)) document.getElementById('food-cat').value = 'condiment';
    };
    sl.appendChild(item);
  });
  sl.classList.add('open');
};

document.getElementById('modal-cancel').onclick = () => document.getElementById('add-modal').classList.remove('open');
document.getElementById('modal-confirm').onclick = () => {
  const name = document.getElementById('food-name-input').value.trim();
  const cat = document.getElementById('food-cat').value;
  const buyDate = document.getElementById('food-buy-date').value;
  const days = parseInt(document.getElementById('food-days').value);
  if (!name || !buyDate || !days) return;
  const food = { name, cat, buyDate, days };
  if (editingIdx >= 0) {
    appData.foods[editingIdx] = food;
  } else {
    appData.foods.push(food);
  }
  saveData();
  renderList();
  document.getElementById('add-modal').classList.remove('open');
};

// Confirm modal
function showConfirm(msg, cb) {
  document.getElementById('confirm-msg').textContent = msg;
  confirmCb = cb;
  document.getElementById('confirm-modal').classList.add('open');
}
document.getElementById('confirm-cancel').onclick = () => { document.getElementById('confirm-modal').classList.remove('open'); confirmCb = null; };
document.getElementById('confirm-ok').onclick = () => { document.getElementById('confirm-modal').classList.remove('open'); if (confirmCb) { confirmCb(); confirmCb = null; } };

document.getElementById('add-btn').onclick = openAddModal;

// Tab switching
function switchTab(tab) {
  document.getElementById('food-list').style.display = tab === 'fridge' ? 'block' : 'none';
  document.getElementById('settings-page').style.display = tab === 'settings' ? 'block' : 'none';
  document.getElementById('add-btn').style.display = tab === 'fridge' ? 'flex' : 'none';
  const filterRow = document.getElementById('filter-row');
  const statsBar = document.getElementById('stats-bar');
  if (filterRow) filterRow.style.display = tab === 'fridge' ? 'flex' : 'none';
  if (statsBar) statsBar.style.display = tab === 'fridge' ? 'flex' : 'none';
  document.getElementById('tab-fridge').querySelector('div:last-child').style.color = tab === 'fridge' ? 'var(--accent)' : 'var(--text-muted)';
  document.getElementById('tab-settings').querySelector('div:last-child').style.color = tab === 'settings' ? 'var(--accent)' : 'var(--text-muted)';
  if (tab === 'settings') renderDbList();
}

// DB management
function getCustomDb() {
  if (!appData.customDb) appData.customDb = {};
  return appData.customDb;
}

function getMergedDb() {
  // Returns {name: days} merged
  const custom = getCustomDb(); // {name: days}
  return { ...SHELF_LIFE, ...custom };
}

function getMergedDbFull() {
  // Returns {name: {days, cat}} merged
  const custom = getCustomDb();
  const result = {};
  Object.entries(SHELF_LIFE_DB).forEach(([k,v]) => { result[k] = {...v}; });
  Object.entries(custom).forEach(([k,v]) => {
    if (typeof v === 'object') result[k] = v;
    else result[k] = { days: v, cat: result[k]?.cat || 'other' };
  });
  return result;
}

let dbEditingKey = null;

function renderDbList() {
  const q = document.getElementById('db-search').value.trim();
  const list = document.getElementById('db-list');
  const merged = getMergedDbFull();
  const entries = Object.entries(merged)
    .filter(([name]) => !q || name.includes(q))
    .map(([name, v]) => [name, v.days, v.cat])
    .sort((a, b) => a[0].localeCompare(b[0], 'zh'));
  
  list.innerHTML = '';
  if (entries.length === 0) {
    list.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:30px;font-size:14px;">找不到食材</div>';
    return;
  }
  entries.forEach(([name, days, cat]) => {
    const isCustom = !!getCustomDb()[name];
    const row = document.createElement('div');
    row.style.cssText = 'background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;';
    row.innerHTML = `
      <div style="flex:1;">
        <span style="font-size:14px;font-weight:500;">${name}</span>
      </div>
      <div style="font-size:13px;color:var(--text-muted);">${days} 天</div>
      <button style="padding:4px 10px;border-radius:8px;border:1px solid var(--border);background:none;font-size:12px;color:var(--text-muted);cursor:pointer;font-family:inherit;" data-name="${name}" data-days="${days}" data-custom="${isCustom}" class="db-edit-btn">編輯</button>
    `;
    row.querySelector('.db-edit-btn').onclick = (e) => {
      const btn = e.target;
      dbEditingKey = btn.dataset.name;
      const isC = btn.dataset.custom === 'true';
      document.getElementById('db-modal-title').textContent = '編輯食材';
      document.getElementById('db-food-name').value = btn.dataset.name;
      document.getElementById('db-food-name').disabled = true;
      document.getElementById('db-food-days').value = btn.dataset.days;
      document.getElementById('db-food-cat').value = cat || 'other';
      document.getElementById('db-delete').style.display = isC ? 'block' : 'none';
      document.getElementById('db-modal').classList.add('open');
    };
    list.appendChild(row);
  });
}

document.getElementById('db-search').oninput = renderDbList;

document.getElementById('db-add-btn').onclick = () => {
  dbEditingKey = null;
  document.getElementById('db-modal-title').textContent = '新增食材';
  document.getElementById('db-food-name').value = '';
  document.getElementById('db-food-name').disabled = false;
  document.getElementById('db-food-days').value = '';
  document.getElementById('db-food-cat').value = 'veg';
  document.getElementById('db-delete').style.display = 'none';
  document.getElementById('db-modal').classList.add('open');
};

document.getElementById('db-cancel').onclick = () => {
  document.getElementById('db-food-name').disabled = false;
  document.getElementById('db-modal').classList.remove('open');
};
document.getElementById('db-delete').onclick = () => {
  const name = dbEditingKey;
  document.getElementById('db-modal').classList.remove('open');
  document.getElementById('db-food-name').disabled = false;
  showConfirm(`確定要刪除「${name}」的設定嗎？`, () => {
    delete appData.customDb[name];
    saveData();
    renderDbList();
  });
};
document.getElementById('db-save').onclick = () => {
  const name = dbEditingKey || document.getElementById('db-food-name').value.trim();
  const days = parseInt(document.getElementById('db-food-days').value);
  if (!name || !days) return;
  if (!appData.customDb) appData.customDb = {};
  appData.customDb[name] = { days, cat: document.getElementById('db-food-cat').value || 'other' };
  saveData();
  document.getElementById('db-modal').classList.remove('open');
  document.getElementById('db-food-name').disabled = false;
  dbEditingKey = null;
  renderDbList();
};

// Init
buildFilterRow();
renderList();
</script>
</body>
</html>
